<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Form</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">   
    <meta name="description" content="Dr PRO template project">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="styles/bootstrap-4.1.2/bootstrap.min.css">
    <link href="plugins/font-awesome-4.7.0/css/font-awesome.min.css" rel="stylesheet" type="text/css">
    <link rel="stylesheet" type="text/css" href="plugins/OwlCarousel2-2.2.1/owl.carousel.css">
    <link rel="stylesheet" type="text/css" href="plugins/OwlCarousel2-2.2.1/owl.theme.default.css">
    <link rel="stylesheet" type="text/css" href="plugins/OwlCarousel2-2.2.1/animate.css">
    <link href="plugins/jquery-datepicker/jquery-ui.css" rel="stylesheet" type="text/css">
    <link rel="stylesheet" type="text/css" href="styles/main_styles.css">
    <link rel="stylesheet" type="text/css" href="styles/responsive.css">

</head>
<body>
    <div class="intro">
        <div class="container">
            <div class="row">

                <!-- Intro Content -->
                <div class="col-lg-6 intro_col">
                    <div class="intro_content">
                        <div class="section_title_container">
                            <div class="section_subtitle">This is Zionstone Electro Musical</div>
                            <div class="section_title"><h2>Welcome to our Store</h2></div>
                        </div>
                        <div class="intro_text">
                            <p>We make you musically sound.</p>
                        </div>
                        <div class="milestones">
                            <div class="row milestones_row">
                            
                                <!-- Milestone -->
                                <div class="col-md-4 milestone_col">
                                    <div class="milestone">
                                        <div class="milestone_counter" data-end-value="3000" data-sign-before="+">0</div>
                                        <div class="milestone_text">Satisfied Customers</div>
                                    </div>
                                </div>

                                <!-- Milestone -->
                                <div class="col-md-4 milestone_col">
                                    <div class="milestone">
                                        <div class="milestone_counter" data-end-value="20">0</div>
                                        <div class="milestone_text">Gears and Equipments</div>
                                    </div>
                                </div>

                                <!-- Milestone -->
                                <div class="col-md-4 milestone_col">
                                    <div class="milestone">
                                        <div class="milestone_counter" data-end-value="718">0</div>
                                        <div class="milestone_text">Successful Returns</div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>

                <!-- Intro Form -->
                <div class="col-lg-6 intro_col">
                    <div class="intro_form_container">
                        <div class="intro_form_title">Book a Rental</div>
                        <form action="#" class="intro_form" id="intro_form">
                            <div class="d-flex flex-row align-items-start justify-content-between flex-wrap">
                                <input type="text" class="intro_input" placeholder="Your Name" required="required">
                                <input type="email" class="intro_input" placeholder="Your E-mail" required="required">
                                <input type="tel" class="intro_input" placeholder="Your Phone" required="required">
                                <select class="intro_select intro_input" required>
                                    <option disabled="" selected="" value="">Equipment Type</option>
                                    <option>Musical Instruments</option>
                                    <option>Sound Equipments</option>
                                    <option>Samplers and Percussions</option>
                                    <option>Production Gear</option>
                                </select>
                                <select class="intro_select intro_input" required="required">
                                        <option disabled="" selected="" value="">Doctor</option>
                                        <option>Doctor 1</option>
                                        <option>Doctor 2</option>
                                        <option>Doctor 3</option>
                                        <option>Doctor 4</option>
                                        <option>Doctor 5</option>
                                    </select>
                                <input type="text" id="datepicker" class="intro_input datepicker" placeholder="Date" required="required">
                            </div>
                            <button class="button button_1 intro_button trans_200">book now</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script>
        function submitBooking() {
            const bookingForm = document.getElementById("intro_form");
            const formData = new FormData(bookingForm);

            fetch("/booking", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    product: formData.get("product"),
                    date: formData.get("date"),
                    time: formData.get("time")
                })
            })
            .then(response => {
                if (response.ok) {
                    alert("Booking successful!");
                } else {
                    alert("Failed to book. Please try again.");
                }
            })
            .catch(error => console.error("Error:", error));
        }
    </script>

<script src="plugins/greensock/TweenMax.min.js"></script>
<script src="plugins/greensock/TimelineMax.min.js"></script>
<script src="plugins/scrollmagic/ScrollMagic.min.js"></script>
<script src="plugins/greensock/animation.gsap.min.js"></script>
<script src="plugins/greensock/ScrollToPlugin.min.js"></script>

</body>
</html>
